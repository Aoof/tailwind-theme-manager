<!DOCTYPE html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>OKLCH Color Editor</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {},
        },
      };
    </script>
    <!-- External Libraries -->
    <script src="public/js/color.global.min.js"></script>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/@simonwep/pickr/dist/themes/classic.min.css"
    />
    <script src="https://cdn.jsdelivr.net/npm/@simonwep/pickr/dist/pickr.min.js"></script>

    <!-- Custom Styles -->
    <link rel="stylesheet" href="public/css/styles.css" />
    <style>
      /* Pickr Dark Mode Support */
      .dark .pcr-app {
        background: #18181b !important; /* zinc-900 */
        border: 1px solid #27272a !important; /* zinc-800 */
        box-shadow: 0 20px 25px -5px rgb(0 0 0 / 0.5) !important;
      }
      .dark .pcr-app .pcr-interaction input {
        background: #09090b !important; /* zinc-950 */
        color: #f4f4f5 !important; /* zinc-100 */
        border: 1px solid #27272a !important;
      }
      .dark .pcr-app .pcr-interaction .pcr-save {
        background: #6366f1 !important; /* indigo-500 */
      }
      /* Ensure the picker UI hides properly when not active in dark mode */
      .pcr-app {
        transition: opacity 0.3s, transform 0.3s;
      }
    </style>
  </head>
  <body
    class="bg-zinc-50 text-zinc-900 dark:bg-zinc-950 dark:text-zinc-50 transition-colors duration-300 antialiased"
  >
    <div id="toast-container" class="fixed top-6 right-6 z-50 flex flex-col gap-3 pointer-events-none *:pointer-events-auto"></div>
    <div class="container mx-auto px-6 py-12 max-w-5xl">
      <div class="flex justify-between items-center mb-12">
        <div>
          <h1 class="text-3xl font-black tracking-tight text-indigo-600 dark:text-indigo-400">
            OKLCH Studio
          </h1>
          <p class="text-zinc-500 dark:text-zinc-400 text-sm mt-1">Professional color design system</p>
        </div>
        <button
          id="theme-toggle"
          class="p-2.5 rounded-xl bg-zinc-200/50 dark:bg-zinc-800/50 border border-zinc-300/50 dark:border-zinc-700/50 hover:bg-zinc-200 dark:hover:bg-zinc-800 focus:outline-none focus:ring-2 focus:ring-indigo-500 transition-all"
        >
          <svg
            id="dark-icon"
            class="w-5 h-5 hidden dark:block text-yellow-400"
            fill="currentColor"
            viewBox="0 0 20 20"
          >
            <path
              d="M10 2a1 1 0 011 1v1a1 1 0 11-2 0V3a1 1 0 011-1zm4 8a4 4 0 11-8 0 4 4 0 018 0zm-.464 4.95l.707.707a1 1 0 001.414-1.414l-.707-.707a1 1 0 00-1.414 1.414zm2.12-10.607a1 1 0 010 1.414l-.706.707a1 1 0 11-1.414-1.414l.707-.707a1 1 0 011.414 0zM17 11a1 1 0 100-2h-1a1 1 0 100 2h1zm-7 4a1 1 0 011 1v1a1 1 0 11-2 0v-1a1 1 0 011-1zM5.05 6.464A1 1 0 106.465 5.05l-.708-.707a1 1 0 00-1.414 1.414l.707.707zm1.414 8.486l-.707.707a1 1 0 01-1.414-1.414l.707-.707a1 1 0 011.414 1.414zM4 11a1 1 0 100-2H3a1 1 0 000 2h1z"
            ></path>
          </svg>
          <svg
            id="light-icon"
            class="w-5 h-5 block dark:hidden text-indigo-600"
            fill="currentColor"
            viewBox="0 0 20 20"
          >
            <path
              d="M17.293 13.293A8 8 0 016.707 2.707a8.001 8.001 0 1010.586 10.586z"
            ></path>
          </svg>
        </button>
      </div>

      <div class="grid grid-cols-1 lg:grid-cols-3 gap-8 mb-12">
        <div class="lg:col-span-1 bg-white dark:bg-zinc-900 p-8 rounded-2xl shadow-xl shadow-zinc-200/50 dark:shadow-none border border-zinc-200 dark:border-zinc-800">
          <h2
            class="text-xs uppercase tracking-widest font-bold mb-6 text-zinc-400 dark:text-zinc-500"
          >
            Management
          </h2>
          <div class="space-y-6">
            <div>
              <label class="block text-sm font-medium mb-2 text-zinc-600 dark:text-zinc-400">File Name</label>
              <input
                type="text"
                name="filepath"
                placeholder="variables.css"
                value="oklch_colors.css"
                class="w-full px-4 py-3 rounded-xl border border-zinc-200 dark:border-zinc-800 focus:outline-none focus:ring-2 focus:ring-indigo-500 bg-zinc-50 dark:bg-zinc-950 text-sm transition-all"
              />
            </div>

            <div class="flex flex-col gap-3">
              <button
                id="save-button"
                class="w-full px-4 py-3 bg-zinc-900 dark:bg-zinc-100 text-white dark:text-zinc-900 rounded-xl font-semibold hover:opacity-90 transition-all text-sm shadow-lg shadow-zinc-200 dark:shadow-none"
              >
                Export CSS
              </button>
              <button
                id="load-button"
                class="w-full px-4 py-3 bg-white dark:bg-zinc-800 text-zinc-900 dark:text-zinc-100 border border-zinc-200 dark:border-zinc-700 rounded-xl font-semibold hover:bg-zinc-50 dark:hover:bg-zinc-700 transition-all text-sm"
              >
                Import Local
              </button>
            </div>
          </div>
        </div>

        <div class="lg:col-span-2 bg-white dark:bg-zinc-900 p-8 rounded-2xl shadow-xl shadow-zinc-200/50 dark:shadow-none border border-zinc-200 dark:border-zinc-800 flex flex-col">
          <div class="flex justify-between items-center mb-6">
            <h2
                class="text-xs uppercase tracking-widest font-bold text-zinc-400 dark:text-zinc-500"
            >
                Raw CSS Output
            </h2>
            <button id="regenerate-button" class="text-xs font-bold text-indigo-600 dark:text-indigo-400 hover:opacity-75 transition-opacity">
                REFRESH UI
            </button>
          </div>
          <textarea
            id="css-output"
            class="flex-grow w-full min-h-[160px] p-6 font-mono text-sm border border-zinc-200 dark:border-zinc-800 rounded-xl focus:outline-none focus:ring-2 focus:ring-indigo-500/50 bg-zinc-950 text-zinc-300 leading-relaxed scrollbar-hide"
            spellcheck="false"
          ></textarea>
        </div>
      </div>

      <div class="bg-white dark:bg-zinc-900 p-10 rounded-3xl shadow-2xl shadow-zinc-200/50 dark:shadow-none border border-zinc-200 dark:border-zinc-800">
        <div class="flex flex-col sm:flex-row justify-between items-end sm:items-center gap-6 mb-10 pb-8 border-b border-zinc-100 dark:border-zinc-800">
          <div>
            <h2 class="text-2xl font-black text-zinc-900 dark:text-zinc-50">
                Design Palette
            </h2>
            <p class="text-sm text-zinc-500 dark:text-zinc-400 mt-1">Live preview and system control</p>
          </div>
          <div class="flex gap-3">
             <button id="export-image" class="px-5 py-2.5 bg-zinc-100 dark:bg-zinc-800 text-zinc-900 dark:text-zinc-100 rounded-xl border border-zinc-200 dark:border-zinc-700 hover:bg-zinc-200 dark:hover:bg-zinc-700 transition-all text-sm font-bold flex items-center gap-2">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"/></svg>
                Image
             </button>
             <button id="generate-palette" class="px-6 py-2.5 bg-indigo-600 dark:bg-indigo-500 text-white rounded-xl hover:opacity-90 shadow-lg shadow-indigo-200 dark:shadow-none transition-all text-sm font-bold">
                Generate Random
             </button>
          </div>
        </div>
        <div
          id="color-variables-container"
          class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-6"
        >
          <!-- Color variables will be inserted here -->
        </div>
      </div>
    </div>
    </div>

    <div id="color-picker-modal" class="fixed inset-0 z-[100] hidden items-center justify-center p-6 bg-zinc-950/60 backdrop-blur-sm transition-all duration-300">
      <div class="bg-white dark:bg-zinc-900 w-full max-w-md rounded-3xl shadow-2xl border border-zinc-200 dark:border-zinc-800 overflow-hidden transform scale-95 opacity-0 transition-all duration-300" id="color-picker-content">
        <div class="px-8 pt-8 pb-4">
          <h3 class="text-xl font-black text-zinc-900 dark:text-zinc-50 mb-6">Refine Color</h3>
          
          <div class="grid grid-cols-2 gap-4 mb-8">
            <div id="color-preview" class="h-24 rounded-2xl border border-zinc-200 dark:border-white/10 flex items-end p-3 shadow-inner relative overflow-hidden">
              <span class="text-[10px] font-black uppercase tracking-widest bg-white/90 dark:bg-zinc-950/90 text-zinc-900 dark:text-zinc-50 px-2 py-1 rounded-lg relative z-10 shadow-sm">Current</span>
            </div>
            <div id="previous-color" class="h-24 rounded-2xl border border-zinc-200 dark:border-white/10 flex items-end p-3 shadow-inner relative overflow-hidden">
              <span class="text-[10px] font-black uppercase tracking-widest bg-white/90 dark:bg-zinc-950/90 text-zinc-900 dark:text-zinc-50 px-2 py-1 rounded-lg relative z-10 shadow-sm">Previous</span>
            </div>
          </div>

          <div id="color-picker-container" class="mb-8 flex justify-center">
            <div id="color-picker" class="[&_.pcr-button]:!w-full [&_.pcr-button]:!h-10 [&_.pcr-button]:!rounded-xl shadow-lg"></div>
          </div>

          <div class="space-y-4 mb-8">
            <div class="relative">
              <label class="absolute -top-2 left-3 px-1 bg-white dark:bg-zinc-900 text-[10px] font-bold text-zinc-400 uppercase tracking-widest">Hex Value</label>
              <input
                type="text"
                id="hex-input"
                class="w-full px-4 py-3.5 rounded-xl border border-zinc-200 dark:border-zinc-800 bg-zinc-50 dark:bg-zinc-950 text-zinc-900 dark:text-zinc-50 font-mono text-sm focus:ring-2 focus:ring-indigo-500 outline-none transition-all"
              />
            </div>
            <div class="relative">
              <label class="absolute -top-2 left-3 px-1 bg-white dark:bg-zinc-900 text-[10px] font-bold text-zinc-400 uppercase tracking-widest">OKLCH Value</label>
              <input
                type="text"
                id="oklch-input"
                class="w-full px-4 py-3.5 rounded-xl border border-zinc-200 dark:border-zinc-800 bg-zinc-50 dark:bg-zinc-950 text-zinc-900 dark:text-zinc-50 font-mono text-xs focus:ring-2 focus:ring-indigo-500 outline-none transition-all"
              />
            </div>
          </div>
        </div>

        <div class="px-8 py-6 bg-zinc-50 dark:bg-zinc-900/50 border-t border-zinc-100 dark:border-zinc-800 flex justify-end gap-3">
          <button
            id="cancel-color"
            class="px-5 py-2.5 text-zinc-500 dark:text-zinc-400 bg-transparent hover:bg-zinc-200/50 dark:hover:bg-zinc-800 rounded-xl transition-all text-sm font-bold"
          >
            Discard
          </button>
          <button
            id="apply-color"
            class="px-6 py-2.5 bg-zinc-900 dark:bg-zinc-100 text-white dark:text-zinc-900 rounded-xl hover:opacity-90 shadow-lg shadow-zinc-200 dark:shadow-none transition-all text-sm font-bold"
          >
            Update Color
          </button>
        </div>
      </div>
    </div>

    <!-- Non-module Scripts -->
    <script src="public/js/non-module-bundle.js"></script>
  </body>
</html>
